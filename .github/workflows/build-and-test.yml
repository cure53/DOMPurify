name: Build and Test
# The event triggers are configured as following:
# - on `2.x` -> trigger the workflow on every push
# - on any pull request -> trigger the workflow
# This is to avoid running the workflow twice on pull requests.
on:
  push:
    branches:
      - 2.x
  pull_request:

permissions:
  contents: read

jobs:
  install:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [16.x, 17.x, 18.x, 19.x, 20.x, 21.x]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Lint
        run: npm run lint
      - name: Test
        uses: GabrielBB/xvfb-action@b706e4e27b14669b486812790492dc50ca16b465 # v1.7
        with:
          run: npm run test:ci
        env:
          TEST_BROWSERSTACK: ${{ startsWith(matrix.node-version, '21') }}
          TEST_PROBE_ONLY: ${{ github.ref != 'refs/heads/2.x' }}
          BS_USERNAME: ${{ secrets.BS_USERNAME }}
          BS_ACCESSKEY: ${{ secrets.BS_ACCESSKEY }}
